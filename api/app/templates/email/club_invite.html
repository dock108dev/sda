<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<h2>You've been invited to join {{ club_name }}</h2>
<p>{{ inviter_email }} has invited you to join <strong>{{ club_name }}</strong> as a {{ role }}.</p>
<p>Click the link below to accept the invitation. This link expires in 24 hours.</p>
<p><a href="{{ accept_url }}">{{ accept_url }}</a></p>
<p>If you don't recognize this invitation, you can safely ignore this email.</p>
</body>
</html>
