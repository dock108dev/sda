packages:
  - "web"
  - "packages/*"

# pnpm 10.26+ (preferred): explicit allowlist for packages that run install/postinstall scripts.
# Older pnpm 10 used onlyBuiltDependencies; allowBuilds replaces it (#10311).
# Keep both keys for compatibility across pnpm 10 minors.
allowBuilds:
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
