name: Golden Corpus Pipeline Gate

# Required status check on all PRs targeting main.
# Branch protection rule: Settings → Branches → main → Require status checks:
#   "Pipeline · Golden Corpus Gate"
on:
  pull_request:
    branches: ["main"]
    paths:
      - "api/app/services/pipeline/**"
      - "scraper/**"
      - "tests/golden/**"
      - ".github/workflows/golden-corpus-ci.yml"
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  golden-corpus:
    name: Pipeline · Golden Corpus Gate
    runs-on: ubuntu-latest
    timeout-minutes: 9

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      GOLDEN_PASS_THRESHOLD: "95"
      PYTHONPATH: api

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (api + scraper)
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r api/requirements.txt
          uv pip install -e ./scraper
          uv pip install pytest pytest-cov pytest-timeout
          python -c "import pytest_cov, pytest_timeout; print('pytest-cov', pytest_cov.__version__)"

      - name: Run golden corpus pipeline gate
        # Collects all failures rather than stopping on first (-x removed).
        # TestPassRateGate runs last and fails the job if pass rate < GOLDEN_PASS_THRESHOLD.
        # Per-sport summary is written to $GITHUB_STEP_SUMMARY by the conftest plugin.
        # Regression tests (ISSUE-004) run against tests/golden/ fixtures.
        working-directory: scraper
        run: |
          source ../.venv/bin/activate
          python -m pytest tests/test_golden_corpus.py \
            -k "TestPipelineExecution or TestCoverageFields or TestPassRateGate or TestBlockCountRegression or TestRequiredBlockTypes or TestQualityScoreRegression" \
            --timeout=300 \
            -v \
            --tb=short
